{% extends "base.html" %}
{% block content %}
<section class="page-head">
  <div>
    <p class="eyebrow">Administration</p>
    <h1>User Access</h1>
  </div>
</section>

<section class="panel">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Username</th>
          <th>Email</th>
          <th>Role</th>
          <th>Status</th>
          <th>Created</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        {% for user in users %}
          <tr>
            <td>{{ user.username }}</td>
            <td>{{ user.email }}</td>
            <td><span class="status-pill role">{{ user.role }}</span></td>
            <td><span class="status-pill {{ user.status }}">{{ user.status }}</span></td>
            <td>{{ user.created_at.strftime("%Y-%m-%d %H:%M") }}</td>
            <td>
              <form method="post" action="/admin/users/{{ user.user_id }}/status" class="status-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <select name="status">
                  <option value="active" {{ "selected" if user.status == "active" else "" }}>active</option>
                  <option value="blocked" {{ "selected" if user.status == "blocked" else "" }}>blocked</option>
                  <option value="inactive" {{ "selected" if user.status == "inactive" else "" }}>inactive</option>
                </select>
                <button class="small-button" type="submit">Update</button>
              </form>
            </td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</section>
{% endblock %}
