{% extends "base.html" %}
{% block content %}
<section class="page-head">
  <div>
    <p class="eyebrow">Hide data</p>
    <h1>Embed Secret Data</h1>
  </div>
</section>

<section class="panel">
  <form method="post" action="/embed" enctype="multipart/form-data" class="form-grid">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>
      Cover image
      <input name="cover_file" type="file" accept=".png,.bmp,image/png,image/bmp" required>
    </label>
    <label>
      Optional stego password
      <input name="stego_password" type="password" autocomplete="off">
    </label>
    <label class="span-two">
      Secret text
      <textarea name="secret_text" rows="8"></textarea>
    </label>
    <label class="span-two">
      Secret file
      <input name="secret_file" type="file">
    </label>
    <div class="span-two form-actions">
      <button type="submit">Generate Stego File</button>
      <a class="button secondary" href="/dashboard">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
