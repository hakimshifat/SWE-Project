<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} | Secure Information Hiding</title>
  <script>
    (() => {
      const savedTheme = localStorage.getItem("sihs-theme");
      const preferredTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      document.documentElement.dataset.theme = savedTheme || preferredTheme;
    })();
  </script>
  <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ '/dashboard' if current_user else '/' }}"><span class="brand-mark"></span>Secure Information Hiding</a>
    <nav class="nav">
      {% if current_user %}
        <a class="{{ 'active' if request.url.path == '/dashboard' else '' }}" href="/dashboard">Dashboard</a>
        <a class="{{ 'active' if request.url.path == '/embed' else '' }}" href="/embed">Embed</a>
        <a class="{{ 'active' if request.url.path == '/extract' else '' }}" href="/extract">Extract</a>
        {% if current_user.is_admin %}
          <a class="{{ 'active' if request.url.path == '/admin/users' else '' }}" href="/admin/users">Users</a>
          <a class="{{ 'active' if request.url.path == '/admin/logs' else '' }}" href="/admin/logs">Logs</a>
        {% endif %}
        <form method="post" action="/logout" class="inline-form">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
          <button class="link-button" type="submit">Logout</button>
        </form>
      {% else %}
        <a class="{{ 'active' if request.url.path == '/' else '' }}" href="/">Home</a>
        <a class="{{ 'active' if request.url.path == '/login' else '' }}" href="/login">Login</a>
        <a class="{{ 'active' if request.url.path == '/register' else '' }}" href="/register">Register</a>
      {% endif %}
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch color theme">
        <span class="theme-toggle-track">
          <span class="theme-toggle-thumb"></span>
        </span>
        <span class="theme-toggle-text" data-theme-toggle-text>Theme</span>
      </button>
    </nav>
  </header>

  <main class="shell">
    {% if error %}
      <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    {% if success %}
      <div class="alert alert-success">{{ success }}</div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
  <script src="{{ url_for('static', path='/theme.js') }}"></script>
</body>
</html>
